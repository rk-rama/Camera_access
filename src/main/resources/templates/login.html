<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | SecureStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --bg: #0f172a;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Poppins', sans-serif;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            overflow: hidden;
        }

        /* Background Animated Shapes */
        .shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            border-radius: 50%;
        }
        .shape-1 { width: 300px; height: 300px; background: var(--primary); top: -100px; right: -50px; opacity: 0.3; }
        .shape-2 { width: 250px; height: 250px; background: #9333ea; bottom: -50px; left: -50px; opacity: 0.2; }

        .login-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            text-align: center;
        }

        .login-card h2 {
            margin-bottom: 10px;
            font-weight: 600;
            font-size: 28px;
            letter-spacing: -0.5px;
            color: #fff;
        }

        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .form-group label {
            display: block;
            font-size: 13px;
            margin-bottom: 8px;
            color: #cbd5e1;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: white;
            font-size: 14px;
            transition: 0.3s;
            box-sizing: border-box;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1);
        }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background: #2563eb;
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }

        /* Error Message Styling */
        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            margin-bottom: 20px;
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        /* Admin Access Box Section */
        .admin-access-box {
            background: rgba(59, 130, 246, 0.08);
            padding: 20px;
            border-radius: 16px;
            border: 1px dashed rgba(59, 130, 246, 0.3);
            margin-top: 5px;
            transition: 0.3s;
        }

        .admin-access-box:hover {
            background: rgba(59, 130, 246, 0.12);
            border-style: solid;
        }

        .btn-admin {
            background: transparent;
            border: 1.5px solid var(--primary);
            color: var(--primary);
            width: 100%;
            padding: 10px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-admin:hover {
            background: var(--primary);
            color: white;
        }

        .divider {
            margin: 25px 0;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .divider hr { flex: 1; border: 0; border-top: 1px solid var(--border); }
        .divider span { font-size: 12px; color: #64748b; font-weight: 600; }

        .footer-text { margin-top: 25px; font-size: 14px; color: #94a3b8; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer-text a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="shape shape-1"></div>
<div class="shape shape-2"></div>

<div class="login-card">
    <h2>SecureStream</h2>
    <p class="subtitle">Enter your credentials to access the monitor</p>

    <div th:if="${param.error}" class="error-msg">
        Invalid username or password. Please try again.
    </div>

    <form th:action="@{/login}" method="post">
        <div class="form-group">
            <label>Username</label>
            <input type="text" name="username" placeholder="e.g. user1" required autocomplete="off">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn-submit">Sign In</button>
    </form>

    <div class="divider">
        <hr>
        <span>OR</span>
        <hr>
    </div>

    <div class="admin-access-box">
        <p style="font-size: 13px; margin: 0 0 12px 0; color: #cbd5e1;">Are you an Administrator?</p>
        <a th:href="@{/login}" style="text-decoration: none;">
            <button type="button" class="btn-admin">
                Admin Portal Access
            </button>
        </a>
    </div>

    <p class="footer-text">
        New User? <a th:href="@{/register}">Create an account</a>
    </p>
</div>

</body>
</html>
