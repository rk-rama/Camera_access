<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Control | SecureStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        .monitor-box { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 20px; border: 2px solid #ef4444; position: relative; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-msg { margin-top: 20px; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .live-tag { position: absolute; top: 20px; left: 20px; background: #ef4444; padding: 5px 15px; border-radius: 5px; font-size: 12px; font-weight: 700; visibility: hidden; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="monitor-box">
    <div id="liveBadge" class="live-tag">LIVE FEED</div>
    <video id="remoteVideo" autoplay playsinline muted></video>
</div>
<div class="status-msg" id="statusMsg">Connecting to secure socket...</div>

<script>
    let peerConnection;
    let socket;
    const config = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }] };

    function connect() {
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        socket = new WebSocket(protocol + window.location.host + "/video-stream");

        socket.onopen = () => document.getElementById('statusMsg').innerText = "Connected ✅ Waiting for Phone...";

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'offer') handleOffer(data);
            else if (data.type === 'candidate' && peerConnection) {
                await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
            }
        };
        socket.onclose = () => setTimeout(connect, 3000);
    }

    async function handleOffer(offer) {
        peerConnection = new RTCPeerConnection(config);
        peerConnection.ontrack = (e) => {
            document.getElementById('remoteVideo').srcObject = e.streams[0];
            document.getElementById('liveBadge').style.visibility = "visible";
            document.getElementById('statusMsg').innerText = "LIVE FEED ACTIVE 🟢";
        };
        peerConnection.onicecandidate = (e) => {
            if (e.candidate) socket.send(JSON.stringify({ type: 'candidate', candidate: e.candidate }));
        };
        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
    }

    window.onload = connect;
</script>
</body>
</html>
