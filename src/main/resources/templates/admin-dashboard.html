<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Monitor | SecureStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #ef4444; --bg: #0f172a; --glass: rgba(255, 255, 255, 0.05); --border: rgba(255, 255, 255, 0.1); }
        body { margin: 0; padding: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; }
        header { padding: 20px 40px; background: rgba(0,0,0,0.3); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .logo { font-size: 22px; font-weight: 600; color: #3b82f6; }
        .container { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; }
        .monitor-box { width: 100%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 20px; border: 2px solid var(--primary); position: relative; overflow: hidden; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); }
        #remoteVideo { width: 100%; height: 100%; object-fit: cover; }
        .live-indicator { position: absolute; top: 20px; left: 20px; background: var(--primary); padding: 5px 15px; border-radius: 5px; font-size: 12px; font-weight: 600; animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
        .status-msg { color: #94a3b8; font-size: 14px; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <div class="logo">Secure<span>Stream</span> <small style="color:white; font-size:12px;">| ADMIN PANEL</small></div>
    <div>Monitoring: <span th:text="${adminName}">Admin</span></div>
</header>

<div class="container">
    <div class="monitor-box">
        <div class="live-indicator">REC ● LIVE</div>
        <video id="remoteVideo" autoplay playsinline></video>
    </div>
    <div class="status-msg" id="statusMsg">Waiting for User to Go Live...</div>
</div>

<script>
    let peerConnection;
    let socket;

    const configuration = {
        'iceServers': [
            { 'urls': 'stun:stun.l.google.com:19302' },
            { 'urls': 'stun:stun1.l.google.com:19302' }
        ]
    };

    function connectWebSocket() {
        const protocol = window.location.protocol === 'https:' ? 'wss://' : 'ws://';
        socket = new WebSocket(protocol + window.location.host + "/video-stream");

        socket.onopen = () => {
            document.getElementById('statusMsg').innerText = "Connected. Waiting for stream...";
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            if (data.type === 'offer') {
                handleOffer(data);
            } else if (data.type === 'candidate' && peerConnection) {
                try { await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate)); } catch(e){}
            }
        };
        socket.onclose = () => setTimeout(connectWebSocket, 2000);
    }

    async function handleOffer(offer) {
        peerConnection = new RTCPeerConnection(configuration);
        peerConnection.ontrack = (event) => {
            document.getElementById('remoteVideo').srcObject = event.streams[0];
            document.getElementById('statusMsg').innerText = "STREAMING ACTIVE";
            document.getElementById('statusMsg').style.color = "#22c55e";
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };

        await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
        const answer = await peerConnection.createAnswer();
        await peerConnection.setLocalDescription(answer);
        socket.send(JSON.stringify({ type: 'answer', sdp: answer.sdp }));
    }

    window.onload = connectWebSocket;
</script>
</body>
</html>
