<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Control | SecureStream Pro</title>

    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100%; height: 100%; background: #000; font-family: 'Space Grotesk', sans-serif; color: white; overflow: hidden; }
        .monitor-box { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #000; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; filter: contrast(1.05) brightness(1.1); transition: opacity 1s ease; }
        .hud-top { position: absolute; top: 25px; left: 30px; right: 30px; display: flex; justify-content: space-between; align-items: center; z-index: 10; pointer-events: none; }
        .live-tag { background: #ef4444; padding: 8px 20px; border-radius: 4px; font-size: 11px; font-weight: 800; letter-spacing: 3px; visibility: hidden; animation: blink 1.5s infinite; box-shadow: 0 0 25px rgba(239, 68, 68, 0.6); text-transform: uppercase; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
        .system-id { font-size: 10px; letter-spacing: 4px; color: rgba(255,255,255,0.4); text-transform: uppercase; }
        .status-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 10; text-align: center; width: 100%; }
        .status-msg { display: inline-block; padding: 14px 40px; background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border-radius: 100px; font-size: 13px; border: 1px solid rgba(255, 255, 255, 0.1); letter-spacing: 2px; box-shadow: 0 20px 50px rgba(0,0,0,0.8); color: #00f2fe; text-transform: uppercase; font-weight: 500; transition: all 0.3s ease; }
        .overlay-fx { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%); background-size: 100% 4px; z-index: 5; pointer-events: none; opacity: 0.2; }
    </style>
</head>
<body>

<div class="monitor-box">
    <div class="overlay-fx"></div>
    <div class="hud-top">
        <div id="liveBadge" class="live-tag">Live Feed Active</div>
        <div class="system-id">SecureStream // Admin_Portal_v3</div>
    </div>
    <video id="remoteVideo" autoplay playsinline muted></video>
</div>

<div class="status-container">
    <div class="status-msg" id="statusMsg">Initializing secure connection...</div>
</div>

<script>
    let peerConnection;
    let socket;

    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    function updateStatus(text, color = "#00f2fe") {
        const msgBox = document.getElementById('statusMsg');
        msgBox.innerText = text;
        msgBox.style.color = color;
        msgBox.style.borderColor = color + "44";
    }

    function connect() {
        const wsUrl = "wss://camera-access.onrender.com/video-stream";
        console.log("Connecting to WebSocket...");
        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            console.log("Connected to Server ✅");
            updateStatus("Connected ✅ Waiting for Phone...", "#00f2fe");
        };

        socket.onmessage = async (event) => {
            const data = JSON.parse(event.data);
            console.log("Signal:", data.type);

            if (data.type === 'offer') {
                updateStatus("Offer detected. Handshaking...", "#a855f7");
                handleOffer(data);
            } else if (data.type === 'candidate' && peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                } catch (e) { console.error("ICE Error:", e); }
            }
        };

        socket.onclose = () => {
            updateStatus("Reconnecting to Secure Server...", "#facc15");
            document.getElementById('liveBadge').style.visibility = "hidden";
            setTimeout(connect, 3000);
        };
    }

    async function handleOffer(offer) {
        if (peerConnection) peerConnection.close();
        peerConnection = new RTCPeerConnection(config);

        peerConnection.ontrack = (event) => {
            console.log("Stream Received! 🎥");
            const remoteVideo = document.getElementById('remoteVideo');
            if (event.streams && event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('liveBadge').style.visibility = "visible";
                updateStatus("LIVE FEED DECRYPTED 🟢", "#22c55e");
            }
        };

        peerConnection.onicecandidate = (event) => {
            if (event.candidate && socket.readyState === WebSocket.OPEN) {
                socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };

        try {
            // Handshake logic fixed
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            socket.send(JSON.stringify({
                type: 'answer',
                sdp: answer.sdp
            }));
            console.log("Answer sent! ✅");
        } catch (e) {
            console.error("Handshake Error:", e);
            updateStatus("Handshake Error! ⚠️", "#ef4444");
        }
    }

    window.onload = connect;
</script>
