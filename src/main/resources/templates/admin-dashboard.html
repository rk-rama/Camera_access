<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Control | SecureStream</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; font-family: 'Poppins', sans-serif; background: #0f172a; color: white; display: flex; flex-direction: column; height: 100vh; align-items: center; justify-content: center; }
        .monitor-box { width: 90%; max-width: 800px; aspect-ratio: 16/9; background: #000; border-radius: 20px; border: 2px solid #ef4444; position: relative; box-shadow: 0 0 30px rgba(239, 68, 68, 0.2); overflow: hidden; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .status-msg { margin-top: 20px; padding: 10px 20px; background: rgba(255,255,255,0.05); border-radius: 10px; font-size: 14px; border: 1px solid rgba(255,255,255,0.1); }
        .live-tag { position: absolute; top: 20px; left: 20px; background: #ef4444; padding: 5px 15px; border-radius: 5px; font-size: 12px; font-weight: 700; visibility: hidden; animation: blink 1.5s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="monitor-box">
    <div id="liveBadge" class="live-tag">LIVE FEED</div>
    <video id="remoteVideo" autoplay playsinline muted></video>
</div>
<div class="status-msg" id="statusMsg">Initializing secure connection...</div>

<script>
    let peerConnection;
    let socket;

    // Google STUN servers for NAT Traversal (Very important for Phone-to-Laptop)
    const config = {
        iceServers: [
            { urls: 'stun:stun.l.google.com:19302' },
            { urls: 'stun:stun1.l.google.com:19302' },
            { urls: 'stun:stun2.l.google.com:19302' }
        ]
    };

    function connect() {
        // Render ka static secure URL use kar rahe hain bypass ke liye
        const wsUrl = "wss://camera-access.onrender.com/video-stream";
        console.log("Connecting to WebSocket:", wsUrl);

        socket = new WebSocket(wsUrl);

        socket.onopen = () => {
            console.log("WebSocket Status: CONNECTED! ✅");
            document.getElementById('statusMsg').innerText = "Connected ✅ Waiting for Phone...";
        };

        socket.onmessage = async (event) => {
            console.log("New Signal Received:", event.data);
            const data = JSON.parse(event.data);

            if (data.type === 'offer') {
                console.log("Offer detected. Starting WebRTC Negotiation...");
                handleOffer(data);
            } else if (data.type === 'candidate' && peerConnection) {
                try {
                    await peerConnection.addIceCandidate(new RTCIceCandidate(data.candidate));
                    console.log("ICE Candidate synchronized! ❄️");
                } catch (e) {
                    console.error("Error adding candidate:", e);
                }
            }
        };

        socket.onerror = (error) => {
            console.error("WebSocket Error ❌:", error);
            document.getElementById('statusMsg').innerText = "Network Error! ❌ (Check Console)";
        };

        socket.onclose = () => {
            console.log("Socket Closed. Reconnecting...");
            document.getElementById('statusMsg').innerText = "Reconnecting to server...";
            setTimeout(connect, 3000); // 3 second baad retry
        };
    }

    async function handleOffer(offer) {
        // Naya Peer Connection banayein
        peerConnection = new RTCPeerConnection(config);

        // Jab phone se video track aaye, toh video element mein set karein
        peerConnection.ontrack = (event) => {
            console.log("Video Stream Received! 🎥 Starting playback...");
            const remoteVideo = document.getElementById('remoteVideo');
            if (remoteVideo.srcObject !== event.streams[0]) {
                remoteVideo.srcObject = event.streams[0];
                document.getElementById('liveBadge').style.visibility = "visible";
                document.getElementById('statusMsg').innerText = "LIVE FEED ACTIVE 🟢";
            }
        };

        // Network candidates phone ko bhejein
        peerConnection.onicecandidate = (event) => {
            if (event.candidate) {
                socket.send(JSON.stringify({ type: 'candidate', candidate: event.candidate }));
            }
        };

        // Connection State monitor karein
        peerConnection.oniceconnectionstatechange = () => {
            console.log("Connection Status:", peerConnection.iceConnectionState);
            if (peerConnection.iceConnectionState === "disconnected") {
                document.getElementById('statusMsg').innerText = "Phone Disconnected! 🔴";
                document.getElementById('liveBadge').style.visibility = "hidden";
            }
        };

        try {
            // Offer accept karein aur Answer generate karein
            await peerConnection.setRemoteDescription(new RTCSessionDescription(offer));
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);

            // Phone ko Answer bhej dein
            socket.send(JSON.stringify({
                type: 'answer',
                sdp: answer.sdp
            }));
            console.log("Answer sent to phone! 📤 Waiting for video...");
        } catch (e) {
            console.error("WebRTC Handshake Error:", e);
        }
    }

    // Page load hote hi connect karein
    window.onload = connect;
</script>
</body>
</html>
